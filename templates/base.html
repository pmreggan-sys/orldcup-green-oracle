<!DOCTYPE html>
<html lang="{{ text.html_lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ text.page_title }} · {{ text.page_subtitle }}</title>
    <meta name="description" content="{{ text.hero_body }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/site.css') }}">
    <script src="{{ url_for('static', path='js/htmx.min.js') }}" defer></script>
    <script src="{{ url_for('static', path='js/site.js') }}" defer></script>
  </head>
  <body data-lang="{{ lang }}">
    {% block content %}{% endblock %}
  </body>
</html>
